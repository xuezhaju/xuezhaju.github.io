baseURL: "https://xuezhaju.github.io/"
languageCode: "zh-cn"
title: "xuezhaju的博客"
theme: "PaperMod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "xuezhaju的博客 | 🇨🇳"
  description: "个人技术博客"
  keywords: [Blog, Portfolio, Go]
  author: "xuezhaju"
  DateFormat: "2026年06月26日"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  homeInfoParams:
    Title: "👋 你好，我是xuezhaju"
    Content: |
      欢迎来到我的个人网站！

      - 正在学习 **C++ 语言**
      - 喜欢折腾 **cpp** 和 **Godot**
      - 这个博客用 **Hugo** + **PaperMod** 主题搭建

  socialIcons:
    - name: "github"
      url: "https://github.com/xuezhaju"
    - name: "bilibili"
      url: "https://space.bilibili.com/3493127857900357"


menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: about
      name: 关于
      url: /about/
      weight: 20
